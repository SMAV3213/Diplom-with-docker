version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: resort-booking-db
    environment:
      SA_PASSWORD: "nq0/^t&[vD:6.HawN&%Ul!@#"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - resort-network
    restart: unless-stopped

  # Resort Booking API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resort-booking-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ResortBookingDb;User Id=sa;Password=nq0/^t&[vD:6.HawN&%Ul!@#;TrustServerCertificate=True;Connection Timeout=60;"
      JWT__SecretKey: "your-secret-key-min-32-characters-long!"
      JWT__Issuer: "ResortBookingApp"
      JWT__Audience: "ResortBookingUsers"
      JWT__ExpirationMinutes: "60"
    depends_on:
      - sqlserver
    networks:
      - resort-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resort-booking-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: "http://api:8080"
    depends_on:
      - api
    networks:
      - resort-network
    restart: unless-stopped

networks:
  resort-network:
    driver: bridge
